# production
services:
  # --- Reverse Proxy & SSL Management ---
#  nginx-proxy:
#    image: 'jc21/nginx-proxy-manager:latest'
#    container_name: menex-nginx
#    restart: always
#    ports:
#      - '80:80'
#      - '443:443'
#      - '81:81'
#    volumes:
#      - ./nginx/data:/data
#      - ./nginx/letsencrypt:/etc/letsencrypt
#    networks:
#      - menex-network

  # --- MySQL Database ---
  db:
    image: mysql:8.0
    container_name: menex-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: digital_menu
      MYSQL_USER: menex_admin
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3307:3306" # Exposed for MySQL Workbench
    volumes:
      - menex-db-data:/var/lib/mysql # Persistent Volume
    networks:
      - menex-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DATABASE_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Spring Boot Backend ---
  backend:
    image: ahmedelkhalifa1/menex-backend:1.0
    container_name: menex-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DDL_AUTO=none
      - UPLOAD_DIR=${UPLOAD_DIR}
      - BASE_URL=${BASE_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATIONMS=86400000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - MAIL=${MAIL}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - STRIPE_SK=${STRIPE_SK}
      - STRIPE_WHSEC=${STRIPE_WHSEC}
    volumes:
      - ./uploads/restaurants:/app/uploads/restaurants
    networks:
      - menex-network

networks:
  menex-network:
    driver: bridge

# Define the volume so Docker manages it separately from the container lifecycle
volumes:
  menex-db-data: