
services:
  db:
    image: mysql:8.0
    container_name: menex-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: digital_menu
      MYSQL_USER: menex_admin
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: .
    image: menex-backend
    container_name: menex-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DDL_AUTO=validate

      # App Settings
      - UPLOAD_DIR=/app/uploads/restaurants # Changed hyphen to underscore for safe env naming
      - BASE_URL=${BASE_URL}
      - FRONTEND_URL=${FRONTEND_URL}

      # Security (JWT for your cookie authentication)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATIONMS=86400000

      # Email
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - MAIL=${MAIL}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

      #Stripe
      - STRIPE_SK=${STRIPE_SK}
      - STRIPE_WHSEC=${STRIPE_WHSEC}
    volumes:
      - ./uploads/restaurants:/app/uploads/restaurants

